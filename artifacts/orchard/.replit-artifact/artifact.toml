kind = "web"
previewPath = "/"
title = "ORCHARD"
version = "1.0.0"
id = "artifacts/orchard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5173

[services.development]
run = "pnpm --filter @workspace/orchard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/orchard", "run", "build" ]
publicDir = "artifacts/orchard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5173"
BASE_PATH = "/"
